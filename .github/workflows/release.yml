name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build self-contained exe
        run: dotnet publish EventLogAnalyzer.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Zip
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          "TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          Compress-Archive -Path publish/* -DestinationPath "EventLogAnalyzer-$tag-win-x64.zip"

      # On workflow_dispatch, gh creates the tag at the built commit too.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "$env:TAG" `
            "EventLogAnalyzer-$env:TAG-win-x64.zip" `
            --target "${{ github.sha }}" `
            --title "Event Log Analyzer $env:TAG" `
            --generate-notes
