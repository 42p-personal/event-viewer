name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build self-contained exe
        run: dotnet publish EventLogAnalyzer.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "EventLogAnalyzer-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            "EventLogAnalyzer-${{ github.ref_name }}-win-x64.zip" `
            --title "Event Log Analyzer ${{ github.ref_name }}" `
            --generate-notes
